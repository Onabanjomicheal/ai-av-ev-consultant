version: "3.9"
services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data

  frontend:
    image: python:3.11-slim
    working_dir: /app
    command: >
      bash -c "pip install streamlit plotly httpx &&
               streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    env_file:
      - ../.env
    volumes:
      - ../:/app
    depends_on:
      - api
