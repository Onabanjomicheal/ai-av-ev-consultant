services:
  - type: web
    name: av-ev-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: prod
      - key: LLM_PROVIDER
        value: claude
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: ""
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
